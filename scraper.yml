name: Flight Scraper

on:
  schedule:
    - cron: '0 5,9 * * *'
    - cron: '30 13 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - run: pip install pandas requests tqdm

      - run: python main.py

      - name: Commit CSV
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add final_boss.csv
          git commit -m "update" || echo "no changes"
          git push
